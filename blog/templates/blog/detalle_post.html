{% extends 'blog/base.html' %}

{% block content %}

<div class="card">

    <h1>{{ post.titulo }}</h1>

    <h3>{{ post.subtitulo }}</h3>

    {% if post.imagen %}
        <img src="{{ post.imagen.url }}" width="500px">
    {% endif %}

    <br><br>

    <div>
        {{ post.contenido|safe }}
    </div>

    <br>

    <p>
        📅 Publicado: {{ post.fecha }}
    </p>

    <p>
        👤 Autor: {{ post.autor }}
    </p>

    <br>

    <a class="boton" href="{% url 'pages' %}">
        Volver
    </a>

    {% if user.is_authenticated %}

    <br><br>

    <a class="boton" href="{% url 'editar_post' post.id %}">
        ✏️ Editar
    </a>

    <a class="boton" href="{% url 'borrar_post' post.id %}">
        🗑️ Borrar
    </a>

{% endif %}

</div>

{% endblock %}
