<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Vivero Online</title>

    <style>

        body{
            font-family: Arial;
            margin:0;
            background-color:#f4f9f4;
        }

        nav{
            background-color:#2e7d32;
            padding:15px;
            display:flex;
            align-items:center;
            justify-content:space-between;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-right:20px;
            font-weight:bold;
        }

        .nav-left, .nav-right{
            display:flex;
            align-items:center;
        }

        .banner{
            background-image:url('https://images.unsplash.com/photo-1466692476868-aef1dfb1e735');
            background-size:cover;
            background-position:center;
            height:300px;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:50px;
            font-weight:bold;
        }

        .contenido{
            padding:30px;
        }

        .card{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        img{
            border-radius:10px;
        }

        .boton{
            background-color:#2e7d32;
            color:white;
            padding:10px 15px;
            text-decoration:none;
            border-radius:5px;
        }

        .avatar{
            width:35px;
            height:35px;
            border-radius:50%;
            margin-right:8px;
        }

        .user-box{
            display:flex;
            align-items:center;
            color:white;
            gap:10px;
        }

    </style>

</head>

<body>

    <nav>

        <!-- IZQUIERDA -->
        <div class="nav-left">

            <a href="/">Inicio</a>
            <a href="/pages/">Plantas y Flores</a>
            <a href="/cliente/">Clientes</a>
            <a href="/productos/">Productos</a>
            <a href="/pedidos/">Pedidos</a>
            <a href="/admin/">Admin</a>
            <a href="{% url 'about' %}">About</a>

        </div>

        <!-- DERECHA (USUARIO) -->
        <div class="nav-right">

            {% if user.is_authenticated %}

                <div class="user-box">

                    {% if user.profile.avatar %}
                        <img class="avatar" src="{{ user.profile.avatar.url }}">
                    {% else %}
                        <img class="avatar" src="https://cdn-icons-png.flaticon.com/512/847/847969.png">
                    {% endif %}

                    <span>{{ user.username }}</span>

                    <a href="/accounts/profile/">Perfil</a>
                    <a href="/accounts/logout/">Logout</a>

                </div>

            {% else %}

                <a href="/accounts/login/">Login</a>
                <a href="/accounts/register/">Registro</a>

            {% endif %}

        </div>

    </nav>

    <div class="banner">
        🌿 Vivero Online
    </div>

    <div class="contenido">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
